version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: api_guardrails_postgres
    environment:
      POSTGRES_DB: api_guardrails
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password_here
    ports:
      - "5432:5432"

  redis:
    image: redis:latest
    container_name: api_guardrails_redis
    ports:
      - "6379:6379"